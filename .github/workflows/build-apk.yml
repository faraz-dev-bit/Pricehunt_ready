name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Fix Android SDK version
        run: |
          sed -i 's/compileSdkVersion 34/compileSdkVersion 36/g' android/app/build.gradle
          sed -i 's/compileSdk = 34/compileSdk = 36/g' android/app/build.gradle
          sed -i 's/targetSdkVersion 34/targetSdkVersion 36/g' android/app/build.gradle
          sed -i 's/targetSdk = 34/targetSdk = 36/g' android/app/build.gradle

      - name: Build APK
        run: flutter build apk --debug --no-tree-shake-icons --android-skip-build-dependency-validation

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: PriceHunt-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
